version: '3.8'
services:
  postgres:
    image: postgis/postgis:15-3.3
    environment:
      POSTGRES_USER: ots_user
      POSTGRES_PASSWORD: ots_pass
      POSTGRES_DB: ots_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis/redis-stack:latest  # includes RedisSearch + GEO commands
    ports:
      - "6379:6379"

volumes:
  pgdata: